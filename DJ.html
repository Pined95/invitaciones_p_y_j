<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabina DJ - P&J</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* TEMA OSCURO PARA EL DJ */
        :root { --neon: #00e5ff; --dark: #0a0a0a; --gray: #1f1f1f; --text: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); margin: 0; padding: 20px; color: var(--text); }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 15px; }
        .header h1 { color: var(--neon); margin: 0; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--gray); padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; }
        
        .pulse-dot {
            height: 10px; width: 10px; background-color: #4caf50; border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px #4caf50; animation: pulse 1.5s infinite; margin-right: 8px;
        }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }

        /* LISTA DE CANCIONES */
        .song-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        
        .song-card {
            background: var(--gray); border-left: 4px solid var(--neon); padding: 15px;
            border-radius: 8px; transition: 0.3s; cursor: pointer;
        }
        .song-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.2); }
        
        .song-title { font-size: 1.2rem; font-weight: 700; margin: 0 0 5px 0; color: white; display: flex; align-items: center; gap: 10px; }
        .song-requester { font-size: 0.8rem; color: #aaa; margin: 0; }
        
        /* ESTADO TACHADO (CANCION TOCADA) */
        .song-card.played { opacity: 0.4; border-left-color: #555; }
        .song-card.played .song-title { text-decoration: line-through; color: #888; }
        
        .manual-refresh { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 5px 15px; border-radius: 15px; cursor: pointer; font-family: 'Montserrat'; transition: 0.3s; }
        .manual-refresh:hover { background: var(--neon); color: var(--dark); }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-headphones"></i> Peticiones en Vivo</h1>
    </div>

    <div class="status-bar">
        <div>
            <span class="pulse-dot" id="connection-dot"></span>
            <span id="status-text">Conectando a la pista...</span>
        </div>
        <button onclick="loadData(true)" class="manual-refresh"><i class="fa-solid fa-rotate"></i> Forzar</button>
    </div>

    <div class="song-grid" id="songs-container">
        </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxj8mTpblVwa2_pqKR5WpIQ-D0whwVWJxiREY5-yFCq0wjs9KWCEjCzPUL4Fm0DTCA/exec"; 
    
    // Guardamos las canciones tocadas localmente para que no se destachen al recargar
    let playedSongs = JSON.parse(localStorage.getItem('pj_played_songs') || '[]');

    window.onload = () => {
        // Le ponemos una contraseña más sencilla o la misma, tú decides. Dejé la misma.
        const pass = prompt("🎧 Contraseña de Acceso DJ:");
        if(pass !== "PYJ310524") { 
            document.body.innerHTML = "<div style='display:flex;height:100vh;justify-content:center;align-items:center;flex-direction:column;color:white;'><h1>🔒 Acceso Denegado</h1></div>";
            return; 
        }
        loadData();
        // Configurar auto-actualización cada 60 segundos (60000 ms)
        setInterval(() => loadData(false), 60000);
    };

    async function loadData(isManual = false) {
        const statusEl = document.getElementById('status-text');
        const dot = document.getElementById('connection-dot');
        
        if (isManual) statusEl.innerText = "Actualizando ahora...";
        dot.style.backgroundColor = "#ff9800"; // Naranja = cargando

        try {
            const antiCacheId = new Date().getTime();
            const res = await fetch(`${API_URL}?action=getAdminData&id=${antiCacheId}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const text = await res.text();
            const data = JSON.parse(text);
            
            if(data.status === 'success') {
                const songsOnly = data.guests.filter(g => g.cancion && g.cancion.trim().length > 1);
                renderSongs(songsOnly);
                
                const now = new Date();
                statusEl.innerText = `En vivo | Última actualización: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                dot.style.backgroundColor = "#4caf50"; // Verde = OK
            }
        } catch(e) { 
            console.error(e);
            statusEl.innerText = "Sin conexión. Reintentando en breve...";
            dot.style.backgroundColor = "#f44336"; // Rojo = Error
        }
    }

    function togglePlayed(songId, cardElement) {
        cardElement.classList.toggle('played');
        
        if (cardElement.classList.contains('played')) {
            if (!playedSongs.includes(songId)) playedSongs.push(songId);
        } else {
            playedSongs = playedSongs.filter(id => id !== songId);
        }
        // Guardar en el navegador del DJ para que no se borren si recarga la página
        localStorage.setItem('pj_played_songs', JSON.stringify(playedSongs));
    }

    function renderSongs(guestsWithSongs) {
        const container = document.getElementById('songs-container');
        container.innerHTML = ''; 

        if(guestsWithSongs.length === 0) {
            container.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; color:#666; padding:40px;">No hay peticiones musicales aún.</div>';
            return;
        }

        // Invertimos la lista para que las peticiones más nuevas (al final del excel) salgan primero
        guestsWithSongs.reverse().forEach(g => {
            let nombreInvitado = g.nombre || g.nombreCompleto || "-"; 
            let cancion = g.cancion;
            // Usamos el ID del invitado como identificador único de la petición
            let uniqueId = g.id; 
            
            let isPlayed = playedSongs.includes(uniqueId) ? 'played' : '';

            const card = document.createElement('div');
            card.className = `song-card ${isPlayed}`;
            // Al hacer clic, se tacha
            card.onclick = () => togglePlayed(uniqueId, card);
            
            card.innerHTML = `
                <p class="song-title"><i class="fa-solid fa-music"></i> ${cancion}</p>
                <p class="song-requester">Pedido por: <strong>${nombreInvitado}</strong></p>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
