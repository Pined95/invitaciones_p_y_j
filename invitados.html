<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión de Invitados P&J</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #C59D5F; --gold-hover: #b08d55; --dark: #1a1a1a;
            --light: #f4f4f9; --white: #ffffff; --gray: #7f8c8d;
            --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f;
            --shadow: 0 4px 15px rgba(0,0,0,0.05); --border-radius: 12px;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--light); color: var(--dark); margin: 0; padding-bottom: 80px; }
        
        /* Header & Search */
        .header-bar { background: var(--white); padding: 15px 20px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header-title { color: var(--gold); font-weight: 700; font-size: 1.2rem; margin: 0; }
        .search-container { padding: 20px; }
        .search-box { background: var(--white); border-radius: 30px; box-shadow: var(--shadow); display: flex; align-items: center; border: 1px solid #eee; }
        .search-box input { border: none; padding: 15px 20px; width: 100%; outline: none; font-size: 1rem; background: transparent; }
        .search-box i { padding-right: 20px; color: var(--gold); }

        /* Lista */
        .guest-list { padding: 0 20px; }
        .guest-card { background: var(--white); border-radius: var(--border-radius); padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); border-left: 5px solid transparent; cursor: pointer; }
        .status-si { border-left-color: var(--success); } .status-no { border-left-color: var(--danger); } .status-pendiente { border-left-color: var(--warning); }
        .guest-name { font-weight: 600; font-size: 1.05rem; display: flex; justify-content: space-between; }
        .guest-group { font-size: 0.85rem; color: var(--gray); margin-top: 5px; }
        .card-badges { display: flex; gap: 5px; margin-top: 10px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; background: #eee; color: #555; }
        .badge-table { background: #e3f2fd; color: #1565c0; }

        /* MODAL GRANDE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: none; justify-content: center; align-items: flex-end; }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: var(--white); width: 100%; height: 90vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; animation: slideUp 0.3s; }
        @media(min-width: 600px) { .modal-overlay { align-items: center; } .modal-content { width: 600px; height: auto; max-height: 90vh; border-radius: 20px; } }
        
        .modal-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-weight: 700; color: var(--gold); font-size: 1.1rem; }
        
        .modal-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; background: #fff; }

        /* Form Sections */
        .form-section { margin-bottom: 25px; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: 700; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-col { flex: 1; }
        .form-label { display: block; font-size: 0.8rem; color: var(--gray); margin-bottom: 5px; font-weight: 600; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; font-family: inherit; }
        .form-control:focus { border-color: var(--gold); outline: none; }
        textarea.form-control { resize: none; height: 80px; }

        /* Botones */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none;}
        .btn-save { background: var(--gold); }
        .btn-wa { background: #25D366; margin-bottom: 10px; color: white;}
        .btn-secondary { background: #f0f0f0; color: var(--dark); margin-bottom: 10px; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p style="margin-top:15px;color:var(--gold);font-weight:600">Cargando Datos...</p></div>

    <div class="header-bar">
        <h1 class="header-title"><i class="fa-solid fa-user-pen"></i> Editor Maestro</h1>
        <div style="font-size:0.8rem; font-weight:600" id="statsDisplay">0 Reg</div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por nombre..." autocomplete="off">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>

    <div class="guest-list" id="listContainer"></div>

    <div class="modal-overlay" id="fullModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">EDITAR INVITADO</div>
                <div style="cursor:pointer; font-size:1.5rem;" onclick="closeModal()">&times;</div>
            </div>
            
            <div class="modal-scroll">
                <input type="hidden" id="eRow">
                <input type="hidden" id="eId">
                <input type="hidden" id="eLink">

                <div class="form-section">
                    <div class="section-title">1. Identidad</div>
                    <div class="form-row">
                        <div class="form-col" style="flex:0.4">
                            <label class="form-label">TÍTULO</label>
                            <input type="text" id="eTitulo" class="form-control" placeholder="Sr.">
                        </div>
                        <div class="form-col">
                            <label class="form-label">NOMBRES</label>
                            <input type="text" id="eNombres" class="form-control">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">APELLIDO P.</label>
                            <input type="text" id="eApeP" class="form-control">
                        </div>
                        <div class="form-col">
                            <label class="form-label">APELLIDO M.</label>
                            <input type="text" id="eApeM" class="form-control">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">2. Contacto</div>
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">TELÉFONO</label>
                            <input type="tel" id="eTel" class="form-control">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">CORREO</label>
                            <input type="email" id="eCorreo" class="form-control">
                        </div>
                    </div>
                    <div class="form-row">
                         <a href="#" id="btnWa" target="_blank" class="btn btn-wa" style="flex:1"><i class="fa-brands fa-whatsapp"></i> Chat</a>
                         <button class="btn btn-secondary" style="flex:1" onclick="copyLink()"><i class="fa-solid fa-link"></i> Link</button>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">3. Boda & Logística</div>
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">RSVP</label>
                            <select id="eRsvp" class="form-control">
                                <option value="PENDIENTE">PENDIENTE</option>
                                <option value="SI">CONFIRMADO (SI)</option>
                                <option value="NO">CANCELADO (NO)</option>
                            </select>
                        </div>
                        <div class="form-col">
                            <label class="form-label">MESA</label>
                            <input type="text" id="eMesa" class="form-control">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">INVITADO CIVIL</label>
                            <select id="eCivil" class="form-control">
                                <option value="NO">NO</option>
                                <option value="SI">SI</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">ALERGIAS</label>
                            <textarea id="eAlergias" class="form-control"></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">MENSAJE / DEDICATORIA</label>
                            <textarea id="eMensaje" class="form-control"></textarea>
                        </div>
                    </div>
                     <div class="form-row">
                        <div class="form-col">
                            <label class="form-label">CANCIÓN SUGERIDA</label>
                            <input type="text" id="eCancion" class="form-control">
                        </div>
                    </div>
                </div>

            </div>
            
            <div class="modal-footer">
                <button class="btn btn-save" id="btnSave" onclick="saveData()">GUARDAR CAMBIOS</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        // Pega aquí tu URL nueva
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxj8mTpblVwa2_pqKR5WpIQ-D0whwVWJxiREY5-yFCq0wjs9KWCEjCzPUL4Fm0DTCA/exec"; 

        let allGuests = [];
        const modal = document.getElementById('fullModal');

        window.onload = () => {
             if(SCRIPT_URL.includes("TU_URL")) alert("Configura la URL en el HTML");
             fetchGuests();
        };

        function fetchGuests() {
            fetch(SCRIPT_URL + "?action=getDashboard")
            .then(r => r.json())
            .then(data => {
                if(data.status === 'success') {
                    allGuests = data.guests;
                    renderList(allGuests);
                    document.getElementById('loader').style.display = 'none';
                }
            })
            .catch(e => alert("Error cargando datos"));
        }

        function renderList(guests) {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            document.getElementById('statsDisplay').innerText = `${guests.length} Invitados`;
            
            const limit = guests.length > 50 ? 50 : guests.length;

            guests.slice(0, limit).forEach(g => {
                const card = document.createElement('div');
                card.className = `guest-card status-${getClass(g.rsvp)}`;
                card.onclick = () => openEditor(g.id);
                
                card.innerHTML = `
                    <div class="guest-name">
                        <span>${g.nombreCompleto}</span>
                    </div>
                    <div class="guest-group">${g.grupo}</div>
                    <div class="card-badges">
                        <span class="badge" style="background:${getBadgeColor(g.rsvp)}; color:white">${g.rsvp||'PEND'}</span>
                        ${g.mesa ? `<span class="badge badge-table">Mesa ${g.mesa}</span>` : ''}
                        ${g.civil === 'SI' ? `<span class="badge" style="background:#673ab7;color:white">CIVIL</span>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Búsqueda
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allGuests.filter(g => g.nombreCompleto.toLowerCase().includes(q) || g.grupo.toLowerCase().includes(q));
            renderList(filtered);
        });

        // Abrir Editor
        function openEditor(id) {
            const g = allGuests.find(x => x.id === id);
            if(!g) return;

            // Llenar campos ocultos
            document.getElementById('eRow').value = g.rowIndex;
            document.getElementById('eId').value = g.id;
            document.getElementById('eLink').value = g.link;

            // 1. Identidad
            document.getElementById('eTitulo').value = g.titulo;
            document.getElementById('eNombres').value = g.nombres;
            document.getElementById('eApeP').value = g.apeP;
            document.getElementById('eApeM').value = g.apeM;
            
            // 2. Contacto
            document.getElementById('eTel').value = g.telefono;
            document.getElementById('eCorreo').value = g.correo;
            
            // Botón WhatsApp
            const btnWa = document.getElementById('btnWa');
            if(g.whatsapp) {
                const txt = `Hola ${g.nombres}, te comparto tu invitación: ${g.link}`;
                btnWa.href = `https://wa.me/${g.whatsapp}?text=${encodeURIComponent(txt)}`;
                btnWa.style.pointerEvents = 'auto'; btnWa.style.opacity = 1;
            } else {
                btnWa.href = '#'; btnWa.style.opacity = 0.5; btnWa.style.pointerEvents = 'none';
            }

            // 3. Logística
            document.getElementById('eRsvp').value = normalize(g.rsvp);
            document.getElementById('eMesa').value = g.mesa;
            document.getElementById('eCivil').value = normalizeBool(g.civil);
            document.getElementById('eAlergias').value = g.alergias;
            document.getElementById('eMensaje').value = g.mensaje;
            document.getElementById('eCancion').value = g.cancion;

            modal.classList.add('active');
        }

        function closeModal() { modal.classList.remove('active'); }

        function saveData() {
            const btn = document.getElementById('btnSave');
            const prevText = btn.innerText;
            btn.innerText = "GUARDANDO...";
            btn.style.opacity = 0.7;

            const payload = {
                action: 'saveGuest',
                rowIndex: document.getElementById('eRow').value,
                id: document.getElementById('eId').value,
                
                // Identidad
                titulo: document.getElementById('eTitulo').value,
                nombres: document.getElementById('eNombres').value,
                apeP: document.getElementById('eApeP').value,
                apeM: document.getElementById('eApeM').value,
                
                // Contacto
                telefono: document.getElementById('eTel').value,
                correo: document.getElementById('eCorreo').value,
                
                // Logística
                rsvp: document.getElementById('eRsvp').value,
                mesa: document.getElementById('eMesa').value,
                civil: document.getElementById('eCivil').value,
                alergias: document.getElementById('eAlergias').value,
                mensaje: document.getElementById('eMensaje').value,
                cancion: document.getElementById('eCancion').value
            };

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(r => r.json())
            .then(res => {
                if(res.status === 'success') {
                    // Update Local (Hack simple para no recargar todo)
                    const g = allGuests.find(x => x.id === payload.id);
                    if(g) {
                        g.nombres = payload.nombres; g.apeP = payload.apeP; g.apeM = payload.apeM;
                        g.nombreCompleto = `${payload.nombres} ${payload.apeP} ${payload.apeM}`.trim(); // Simular fórmula
                        g.rsvp = payload.rsvp; g.mesa = payload.mesa; g.civil = payload.civil;
                    }
                    renderList(allGuests); // Refrescar vista
                    closeModal();
                } else {
                    alert("Error: " + res.message);
                }
            })
            .catch(e => alert("Error de red"))
            .finally(() => {
                btn.innerText = prevText;
                btn.style.opacity = 1;
            });
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('eLink').value);
            alert("Enlace copiado");
        }

        // Helpers
        function normalize(v) { return (v && v.includes('SI')) ? 'SI' : (v && v.includes('NO') ? 'NO' : 'PENDIENTE'); }
        function normalizeBool(v) { return (v === 'SI' || v === 'true' || v === true) ? 'SI' : 'NO'; }
        function getClass(v) { return normalize(v).toLowerCase(); }
        function getBadgeColor(v) { return normalize(v) === 'SI' ? '#2ecc71' : (normalize(v) === 'NO' ? '#e74c3c' : '#f1c40f'); }

    </script>
</body>
</html>
